# Workflow 15: Docker Build Basic
# Purpose: Build a Docker image inside GitHub Actions.
# Prerequisites: This demo creates a Dockerfile inline. For real projects, keep Dockerfile in repo.
# How to use: Copy this file to .github/workflows/ in your GitHub repository.

name: Docker Build Basic

on:
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create sample Dockerfile (for demo)
        run: |
          cat > Dockerfile << 'EOF'
          FROM python:3.11-slim
          WORKDIR /app
          COPY requirements.txt .
          RUN pip install --no-cache-dir -r requirements.txt
          COPY app.py .
          EXPOSE 8000
          CMD ["python", "app.py"]
          EOF
          cat > requirements.txt << 'EOF'
          flask==3.0.0
          EOF
          cat > app.py << 'EOF'
          from flask import Flask
          app = Flask(__name__)

          @app.route("/")
          def hello():
              return "Hello from Docker!"

          if __name__ == "__main__":
              app.run(host="0.0.0.0", port=8000)
          EOF

      - name: Build Docker image
        run: |
          docker build -t student-demo-app:latest .
          echo "Docker image built successfully."

      - name: Run Docker container and test
        run: |
          docker run -d --name demo-app -p 8000:8000 student-demo-app:latest
          sleep 5
          curl -f http://localhost:8000 || (docker logs demo-app && exit 1)
          echo "Container is running and responding!"
          docker stop demo-app
          docker rm demo-app

      - name: Show Docker images
        run: docker images | grep student-demo-app
