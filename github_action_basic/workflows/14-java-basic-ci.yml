# Workflow 14: Java Basic CI
# Purpose: Standard Java CI — checkout, setup-java, Maven build and test.
# This workflow creates a minimal Maven project inline for learning.
# How to use: Copy this file to .github/workflows/ in your GitHub repository.

name: Java Basic CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  java-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Create sample Maven project (for demo)
        run: |
          mkdir -p src/main/java/com/example src/test/java/com/example
          cat > pom.xml << 'EOF'
          <project xmlns="http://maven.apache.org/POM/4.0.0"
                   xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                   xsi:schemaLocation="http://maven.apache.org/POM/4.0.0
                   http://maven.apache.org/xsd/maven-4.0.0.xsd">
            <modelVersion>4.0.0</modelVersion>
            <groupId>com.example</groupId>
            <artifactId>student-demo-app</artifactId>
            <version>1.0.0</version>
            <properties>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
            </properties>
            <dependencies>
              <dependency>
                <groupId>org.junit.jupiter</groupId>
                <artifactId>junit-jupiter</artifactId>
                <version>5.10.0</version>
                <scope>test</scope>
              </dependency>
            </dependencies>
            <build>
              <plugins>
                <plugin>
                  <groupId>org.apache.maven.plugins</groupId>
                  <artifactId>maven-surefire-plugin</artifactId>
                  <version>3.1.2</version>
                </plugin>
              </plugins>
            </build>
          </project>
          EOF
          cat > src/main/java/com/example/App.java << 'EOF'
          package com.example;

          public class App {
              public static int add(int a, int b) {
                  return a + b;
              }

              public static void main(String[] args) {
                  System.out.println("Hello from Java CI!");
                  System.out.println("2 + 3 = " + add(2, 3));
              }
          }
          EOF
          cat > src/test/java/com/example/AppTest.java << 'EOF'
          package com.example;

          import org.junit.jupiter.api.Test;
          import static org.junit.jupiter.api.Assertions.assertEquals;

          public class AppTest {
              @Test
              void testAdd() {
                  assertEquals(5, App.add(2, 3));
              }
          }
          EOF

      - name: Build and test with Maven
        run: mvn clean test

      - name: Package JAR
        run: mvn package -DskipTests
