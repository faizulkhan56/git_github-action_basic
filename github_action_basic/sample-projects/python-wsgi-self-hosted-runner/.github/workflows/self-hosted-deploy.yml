# Self-Hosted Runner Deploy — Python WSGI (No Docker)
#
# Prerequisites:
#   1. Self-hosted runner installed and running on EC2
#   2. App cloned to /home/ubuntu/python-wsgi-self-hosted-runner
#   3. systemd service python-wsgi-app.service configured
#   4. ubuntu user can restart service without password (see README)
#
# This workflow runs ON the EC2 machine — no SSH from GitHub needed.

name: Self-Hosted WSGI Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to EC2 via Self-Hosted Runner
    runs-on: self-hosted

    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4

      - name: Show runner checkout directory
        run: |
          echo "=== Runner checkout directory ==="
          pwd
          ls -la

      # Runner checks out to _work/ folder, but systemd uses a fixed app path.
      # Sync code to the path Gunicorn expects (must match gunicorn.service.example).
      - name: Sync code to application directory
        run: |
          APP_DIR=/home/ubuntu/python-wsgi-self-hosted-runner
          mkdir -p "$APP_DIR"
          cp -f app.py requirements.txt gunicorn.service.example "$APP_DIR/"
          echo "Synced application files to $APP_DIR"
          ls -la "$APP_DIR"

      - name: Create or update Python virtual environment
        run: |
          APP_DIR=/home/ubuntu/python-wsgi-self-hosted-runner
          cd "$APP_DIR"
          if [ ! -d "venv" ]; then
            echo "Creating new virtual environment..."
            python3 -m venv venv
          fi
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          echo "Dependencies installed in $APP_DIR/venv"

      - name: Restart Gunicorn systemd service
        run: |
          sudo systemctl restart python-wsgi-app
          echo "Service restarted."

      - name: Check service status
        run: |
          sudo systemctl status python-wsgi-app --no-pager
          sudo systemctl is-active python-wsgi-app

      - name: Test health endpoint
        run: |
          sleep 3
          curl -f http://localhost:8000/health
          echo ""
          echo "Health check passed!"

      - name: Deployment summary
        run: |
          echo "Deploy complete!"
          echo "Home page: http://localhost:8000/"
          echo "Health:    http://localhost:8000/health"
